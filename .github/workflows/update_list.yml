name: Update Archive List
on:
  push:
    paths:
      - 'data/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Generate List JSON
        run: |
          python scripts/update_archive.py
      - name: Commit and Push
        run: |
          git config --global user.name "Archive Bot"
          git config --global user.email "bot@github.com"
          git add list.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update archive list"
          git push
