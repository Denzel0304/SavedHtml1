<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavedHtml1 Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .card:hover { transform: translateY(-4px); transition: all 0.2s; border-color: #38bdf8; }
        .tool-box { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px dashed #334155; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <section class="tool-box p-6 rounded-2xl mb-12 shadow-2xl">
            <h2 class="text-xl font-bold text-sky-400 mb-4 flex items-center gap-2">
                📁 업로드 파일 이름 정리기
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
                <input type="text" id="inCat" placeholder="카테고리 (예: 경제)" class="bg-slate-800 border border-slate-600 rounded px-3 py-2 text-sm focus:ring-1 focus:ring-sky-500 outline-none">
                <input type="text" id="inTag" placeholder="태그 (쉼표로 구분)" class="bg-slate-800 border border-slate-600 rounded px-3 py-2 text-sm focus:ring-1 focus:ring-sky-500 outline-none">
                <input type="text" id="inTitle" placeholder="제목" class="bg-slate-800 border border-slate-600 rounded px-3 py-2 text-sm focus:ring-1 focus:ring-sky-500 outline-none">
                <input type="text" id="inMemo" placeholder="간단한 메모" class="bg-slate-800 border border-slate-600 rounded px-3 py-2 text-sm focus:ring-1 focus:ring-sky-500 outline-none">
            </div>
            
            <div class="flex flex-col md:flex-row items-center gap-4 border-t border-slate-700 pt-4">
                <div class="flex-1 overflow-hidden">
                    <p class="text-xs text-slate-500 mb-1">파일 이름 미리보기 (확장자 제외 복사됨):</p>
                    <code id="resultName" class="text-sky-300 text-sm font-mono break-all bg-slate-900 px-2 py-1 rounded block tracking-tight">정보를 입력해 주세요.</code>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <button onclick="copyFileName()" class="flex-1 md:flex-none bg-sky-600 hover:bg-sky-500 text-white px-6 py-2 rounded-lg text-sm font-bold transition shadow-lg">
                        이름 복사
                    </button>
                    <a href="https://github.com/Denzel0304/SavedHtml1/upload/main/data" target="_blank" class="flex-1 md:flex-none bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg text-sm font-bold transition text-center shadow-lg">
                        업로드 이동
                    </a>
                </div>
            </div>
        </section>

        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4 border-b border-slate-800 pb-6">
            <h1 class="text-3xl font-bold text-white tracking-tight">Digital <span class="text-sky-500 text-4xl">Archive</span></h1>
            <input type="text" id="searchInput" placeholder="저장된 지식 검색..." 
                   class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 w-full md:w-96 focus:outline-none focus:ring-2 focus:ring-sky-500 transition-all shadow-inner">
        </header>

        <div id="categoryFilter" class="flex flex-wrap gap-2 mb-8"></div>
        <div id="archiveGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const inCat = document.getElementById('inCat');
        const inTag = document.getElementById('inTag');
        const inTitle = document.getElementById('inTitle');
        const inMemo = document.getElementById('inMemo');
        const resultName = document.getElementById('resultName');

        // 파일명 생성 로직 (확장자 제외)
        function generatePureName() {
            const cat = inCat.value.trim() || "미분류";
            const tag = inTag.value.trim() || "";
            const title = inTitle.value.trim() || "제목없음";
            const memo = inMemo.value.trim() || "";
            
            let name = `[${cat}]`;
            if(tag) name += `[${tag.replace(/\s/g, '')}]`;
            name += ` ${title}`;
            if(memo) name += `_${memo}`;
            
            return name;
        }

        function updatePreview() {
            const pureName = generatePureName();
            resultName.innerText = pureName + ".html"; // 미리보기는 전체 표시
        }

        [inCat, inTag, inTitle, inMemo].forEach(el => el.addEventListener('input', updatePreview));

        function copyFileName() {
            const pureName = generatePureName(); // 복사는 확장자 없이
            if(navigator.clipboard) {
                navigator.clipboard.writeText(pureName).then(() => {
                    alert(`"${pureName}"\n복사되었습니다! F2를 눌러 붙여넣으세요.`);
                });
            }
        }

        // --- 데이터 로드 및 렌더링 로직 ---
        let allData = [];
        async function loadArchive() {
            try {
                // 캐시 방지를 위해 랜덤 쿼리 추가
                const res = await fetch('list.json?v=' + Math.random());
                allData = await res.json();
                renderCategories();
                renderCards(allData);
            } catch (e) { 
                document.getElementById('archiveGrid').innerHTML = 
                    "<div class='col-span-full py-20 text-center text-slate-500'>데이터를 불러오는 중이거나 아직 없습니다.<br>파일 업로드 후 약 1분만 기다려 주세요.</div>";
            }
        }

        function renderCategories() {
            const cats = ['전체', ...new Set(allData.map(item => item.category))];
            const container = document.getElementById('categoryFilter');
            container.innerHTML = cats.map(cat => `
                <button onclick="filterCategory('${cat}')" class="px-4 py-1.5 rounded-full bg-slate-800 hover:bg-sky-600 text-xs font-semibold transition-all">
                    ${cat}
                </button>
            `).join('');
        }

        function renderCards(data) {
            const container = document.getElementById('archiveGrid');
            if(data.length === 0) {
                container.innerHTML = "<div class='col-span-full text-center py-10 text-slate-500'>검색 결과가 없습니다.</div>";
                return;
            }
            container.innerHTML = data.map(item => `
                <div class="card bg-slate-800 border border-slate-700 p-6 rounded-2xl flex flex-col justify-between shadow-lg">
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[10px] font-black text-sky-400 px-2 py-0.5 bg-sky-900/40 rounded-md uppercase tracking-tighter border border-sky-800/50">${item.category}</span>
                            <span class="text-[10px] text-slate-500 font-mono">${item.date}</span>
                        </div>
                        <h3 class="text-lg font-bold mb-3 break-all text-slate-100 leading-snug">${item.title}</h3>
                        <p class="text-sm text-slate-400 mb-5 line-clamp-3 leading-relaxed font-light">${item.memo || '-'}</p>
                        <div class="flex flex-wrap gap-1.5 mb-5">
                            ${item.tags.map(tag => `<span class="text-[11px] text-slate-400 bg-slate-900/80 px-2 py-0.5 rounded-md border border-slate-700/50">#${tag}</span>`).join('')}
                        </div>
                    </div>
                    <a href="data/${item.filename}" target="_blank" 
                       class="block w-full text-center py-3 bg-slate-700 hover:bg-sky-600 text-white rounded-xl text-sm font-bold transition-all shadow-md">
                       원본 문서 열기
                    </a>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            if (cat === '전체') renderCards(allData);
            else renderCards(allData.filter(item => item.category === cat));
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allData.filter(item => 
                item.title.toLowerCase().includes(val) || 
                item.memo.toLowerCase().includes(val) ||
                item.tags.some(t => t.toLowerCase().includes(val)) ||
                item.category.toLowerCase().includes(val)
            );
            renderCards(filtered);
        });

        loadArchive();
    </script>
</body>
</html>
